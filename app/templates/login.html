{% extends "base.html" %}

{% block content %}
	<div class="auth-card">
		<h1>登录</h1>
		<div class="warn-line"></div>
		<form method="post" action="{{ url_for('auth.login') }}">
			<label>邮箱
				<input type="email" name="email" required>
			</label>
			<label>密码
				<div class="pwd-wrap" x-data="{ show: false }">
					<input :type="show ? 'text' : 'password'" name="password" required>
					<button class="pwd-eye" type="button" @click="show = !show"
						:title="show ? '隐藏密码' : '显示密码'">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<template x-if="!show">
								<g>
									<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"></path>
									<circle cx="12" cy="12" r="3"></circle>
								</g>
							</template>
							<template x-if="show">
								<g>
									<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
									<path d="M1 1l22 22"></path>
								</g>
							</template>
						</svg>
					</button>
				</div>
			</label>
			<label>验证码
				<div class="captcha-row">
					<input type="text" name="captcha" maxlength="4" autocomplete="off" required>
					<img class="captcha-img" src="{{ url_for('auth.captcha') }}" alt="验证码"
						title="点击刷新" onclick="this.src='{{ url_for('auth.captcha') }}?t=' + Date.now()">
				</div>
			</label>
			<button type="submit" class="btn primary full">登录</button>
		</form>
		<p class="auth-switch">还没有账号？<a href="{{ url_for('auth.register') }}">去注册</a></p>
	</div>
{% endblock %}
